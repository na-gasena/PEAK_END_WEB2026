name: Build & Deploy to Sakura

# TinaCloud で編集者が保存すると、設定ブランチ(master)にコミットされる。
# そのコミットを検知して「管理画面+サイトをビルド → さくらへFTP公開」を自動実行する。
on:
  push:
    branches:
      - master   # TinaCloud が保存するブランチに合わせる
  workflow_dispatch:  # GitHub の Actions タブから手動実行も可能

concurrency:
  group: deploy-sakura-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TinaCMS admin + site (WebP最適化込み)
        env:
          # さくらはドメイン直下なので base は '/'（GitHub Actions判定を上書き）
          SITE_BASE: "/"
          # TinaCloud の認証情報（GitHub の Secrets に登録）
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          TINA_BRANCH: ${{ github.ref_name }}
        run: |
          npx tinacms build
          npm run build

      - name: Deploy to Sakura via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}         # 例: boid.sakura.ne.jp（ホスト名だけ）
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22                                  # SFTP は 22 番
          local_path: './dist/*'                    # ビルド成果物（dist の中身）
          remote_path: ${{ secrets.FTP_REMOTE_DIR }} # さくらの公開ディレクトリ 例: /home/boid/www/
          sftp_only: true
