name: Deploy to GitHub Pages

on:
  # masterブランチにプッシュされたときに実行
  push:
    branches: [ master ]
  # GitHubの画面から手動で実行できるようにする設定
  workflow_dispatch:

# GitHub Pages への書き込み権限を許可
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # npmを使用してビルドを実行
          package-manager: npm
          # Astro 6が要求するNode.jsのバージョンを指定
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
